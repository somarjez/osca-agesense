name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PHP checks ────────────────────────────────────────────────────────────
  php-checks:
    name: php-checks
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: osca_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql, bcmath, json, tokenizer, xml, ctype, fileinfo
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Set test database credentials
        run: |
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=osca_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Check PHP syntax (all source files)
        run: |
          find app routes config database/migrations -name "*.php" \
            | xargs -P4 -I{} php -l {} \
            | grep -v "No syntax errors" && exit 1 || true

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        run: php artisan test --stop-on-failure

      - name: Check for debug statements left in code
        run: |
          ! grep -rn --include="*.php" \
            -e "dd(" -e "dump(" -e "var_dump(" -e "print_r(" \
            app/ routes/ \
          && echo "No debug statements found." \
          || (echo "ERROR: Debug statements found — remove before merging." && exit 1)

      - name: Check .env is not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git — add it to .gitignore immediately."
            exit 1
          fi
          echo ".env is not tracked."

  # ── Python ML pipeline tests ──────────────────────────────────────────────
  python-ml-tests:
    name: python-ml-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Run ML pipeline validation tests
        run: python python/tests/test_ml_pipeline.py

  # ── JS / frontend build ───────────────────────────────────────────────────
  js-build:
    name: js-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Confirm compiled assets exist
        run: |
          test -d public/build \
            && echo "public/build exists." \
            || (echo "ERROR: public/build missing after build step." && exit 1)
